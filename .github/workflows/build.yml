name: Github Pages
on:
  push:
    branches: ["dicom-pages", "annotation", "main"]

# Pages: one deploy at a time (avoid overlapping deployments on rapid pushes)
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: lsp-idc-minerva
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 21

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10
          run_install: true

      # annotation -> /minerva-annotation-demo/ …
      # main -> /<repo>/ for this repo’s GitHub Project Pages …
      # dicom-pages -> '' (site is pushed to lsp-idc-minerva, usually at domain root)
      - name: Build with pnpm
        env:
          BASE_PATH: ${{ github.ref == 'refs/heads/annotation' && '/minerva-annotation-demo/' || github.ref == 'refs/heads/main' && format('/{0}/', github.event.repository.name) || '' }}
        run: |
          pnpm run pages

      # main -> GitHub Pages (Settings → Pages → Build: GitHub Actions)
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      # dicom-pages -> lsp-idc-minerva
      - name: Push artifact (dicom-pages)
        if: github.ref == 'refs/heads/dicom-pages'
        env:
          PAT: ${{ secrets.PAT }}
          EMAIL: ${{ secrets.EMAIL }}
          NAME: ${{ secrets.NAME }}
        run: |
          git config --global user.email "$EMAIL"
          git config --global user.name "$NAME"

          git clone "https://${PAT}@github.com/labsyspharm/lsp-idc-minerva.git"
          rm -rf ./lsp-idc-minerva/*
          cp -R ./dist/* ./lsp-idc-minerva/
          cd ./lsp-idc-minerva
          git add -A
          git commit -m update --allow-empty
          git push -f

      # annotation -> minerva-annotation-demo
      - name: Push artifact (annotation)
        if: github.ref == 'refs/heads/annotation'
        env:
          PAT: ${{ secrets.PAT }}
          EMAIL: ${{ secrets.EMAIL }}
          NAME: ${{ secrets.NAME }}
        run: |
          git config --global user.email "$EMAIL"
          git config --global user.name "$NAME"

          git clone "https://${PAT}@github.com/labsyspharm/minerva-annotation-demo.git"
          rm -rf ./minerva-annotation-demo/*
          cp -R ./dist/* ./minerva-annotation-demo/
          cd ./minerva-annotation-demo
          git add -A
          git commit -m update --allow-empty
          git push -f

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

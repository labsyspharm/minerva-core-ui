name: Github Pages
on:
  push:
    branches: ["dicom-pages", "annotation", "main"]

# Pages: one deploy at a time (avoid overlapping deployments on rapid pushes)
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: lsp-idc-minerva
    permissions:
      contents: read
      actions: write # upload-artifact → deploy-site
    steps:
      - uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 21

      - uses: pnpm/action-setup@v5
        name: Install pnpm
        with:
          version: 10
          run_install: true

      # main + annotation: Vite `base: './'` so assets resolve from the deployed URL root
      # (`https://*.github.io/<repo>/`, custom domain apex, etc.).
      # dicom-pages: unset → same output as local `vite build`.
      - name: Build with pnpm
        env:
          BASE_PATH: ${{ (github.ref == 'refs/heads/annotation' || github.ref == 'refs/heads/main') && './' || '' }}
        run: |
          pnpm run pages

      # main -> artifact for branch deploy job (GitHub Pages source must be branch `gh-pages`;
      # see companion job `deploy-site` and Settings → Pages → Deploy from branch.)
      - name: Upload dist for gh-pages deploy
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: site-dist
          path: dist

      # dicom-pages -> lsp-idc-minerva
      - name: Push artifact (dicom-pages)
        if: github.ref == 'refs/heads/dicom-pages'
        env:
          PAT: ${{ secrets.PAT }}
          EMAIL: ${{ secrets.EMAIL }}
          NAME: ${{ secrets.NAME }}
        run: |
          git config --global user.email "$EMAIL"
          git config --global user.name "$NAME"

          git clone "https://${PAT}@github.com/labsyspharm/lsp-idc-minerva.git"
          rm -rf ./lsp-idc-minerva/*
          cp -R ./dist/* ./lsp-idc-minerva/
          cd ./lsp-idc-minerva
          git add -A
          git commit -m update --allow-empty
          git push -f

      # annotation -> minerva-annotation-demo
      - name: Push artifact (annotation)
        if: github.ref == 'refs/heads/annotation'
        env:
          PAT: ${{ secrets.PAT }}
          EMAIL: ${{ secrets.EMAIL }}
          NAME: ${{ secrets.NAME }}
        run: |
          git config --global user.email "$EMAIL"
          git config --global user.name "$NAME"

          git clone "https://${PAT}@github.com/labsyspharm/minerva-annotation-demo.git"
          rm -rf ./minerva-annotation-demo/*
          cp -R ./dist/* ./minerva-annotation-demo/
          cd ./minerva-annotation-demo
          git add -A
          git commit -m update --allow-empty
          git push -f

  # Production `main` deploy: push `dist/` to the **root** of branch `gh-pages` (no subfolder).
  # Repo Settings → Pages → Deploy from branch → `gh-pages` → `/ (root)` so the live site URL is your
  # normal Pages root (`https://<org>.github.io/<repo>/` or custom domain apex). PR previews stay under
  # `pr-preview/**` and are preserved via `clean-exclude`. Serialized with `pr-preview.yml` (`gh-pages` concurrency).
  deploy-site:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: gh-pages
      cancel-in-progress: false
    permissions:
      contents: write
      actions: read # download-artifact from build job
    steps:
      - uses: actions/checkout@v6

      - name: Download built site
        uses: actions/download-artifact@v8
        with:
          name: site-dist
          path: dist

      - name: Push production site to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          force: false
          clean: true
          clean-exclude: |
            pr-preview/**

name: Github Pages
env:
  # Production (`main`) is served at https://demo.minerva.im/ — Vite `base` must be `/`.
  PAGES_BASE_MAIN: "/"
on:
  push:
    branches: ["dicom-pages", "annotation", "main"]

# Pages: one deploy at a time (avoid overlapping deployments on rapid pushes)
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: lsp-idc-minerva
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 21

      - uses: pnpm/action-setup@v5
        name: Install pnpm
        with:
          version: 10
          run_install: true

      # main: base `/` for https://demo.minerva.im/ (GitHub Pages custom domain).
      # annotation: `./` for external demo repos. dicom-pages: unset (`vite` default base).
      - name: Build with pnpm
        env:
          BASE_PATH: ${{ github.ref == 'refs/heads/main' && env.PAGES_BASE_MAIN || (github.ref == 'refs/heads/annotation' && './' || '') }}
        run: |
          pnpm run pages

      # main → GitHub Pages when Settings → Pages → **Source = GitHub Actions**
      # (`upload-pages-artifact` + `deploy` job below). Your site 404s if Source is still Actions but this job was missing,
      # or if Source is **Deploy from branch** while only Actions uploads run — pick one mode and match Settings.
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      # dicom-pages -> lsp-idc-minerva
      - name: Push artifact (dicom-pages)
        if: github.ref == 'refs/heads/dicom-pages'
        env:
          PAT: ${{ secrets.PAT }}
          EMAIL: ${{ secrets.EMAIL }}
          NAME: ${{ secrets.NAME }}
        run: |
          git config --global user.email "$EMAIL"
          git config --global user.name "$NAME"

          git clone "https://${PAT}@github.com/labsyspharm/lsp-idc-minerva.git"
          rm -rf ./lsp-idc-minerva/*
          cp -R ./dist/* ./lsp-idc-minerva/
          cd ./lsp-idc-minerva
          git add -A
          git commit -m update --allow-empty
          git push -f

      # annotation -> minerva-annotation-demo
      - name: Push artifact (annotation)
        if: github.ref == 'refs/heads/annotation'
        env:
          PAT: ${{ secrets.PAT }}
          EMAIL: ${{ secrets.EMAIL }}
          NAME: ${{ secrets.NAME }}
        run: |
          git config --global user.email "$EMAIL"
          git config --global user.name "$NAME"

          git clone "https://${PAT}@github.com/labsyspharm/minerva-annotation-demo.git"
          rm -rf ./minerva-annotation-demo/*
          cp -R ./dist/* ./minerva-annotation-demo/
          cd ./minerva-annotation-demo
          git add -A
          git commit -m update --allow-empty
          git push -f

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

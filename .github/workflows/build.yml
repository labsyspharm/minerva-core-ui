name: Github Pages
on:
  push:
    branches: ["dicom-pages", "annotation", "main"]

# Pages: one deploy at a time (avoid overlapping deployments on rapid pushes)
# Production + PR previews both publish to branch `gh-pages`. Repo Settings → Pages → **Deploy from branch**
# → **gh-pages** → `/ (root)`. GitHub Actions–only Pages (`deploy-pages`) does **not** serve files pushed by
# rossjrw/pr-preview-action — previews must use branch mode ([upstream README](https://github.com/rossjrw/pr-preview-action)).
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: lsp-idc-minerva
    permissions:
      contents: read
      actions: write # upload-artifact for main → publish-gh-pages
    steps:
      - uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 21

      - uses: pnpm/action-setup@v5
        name: Install pnpm
        with:
          run_install: true

      # main + annotation: relative base `./` so assets work at both
      # `https://labsyspharm.github.io/minerva-core-ui/` (project Pages) and https://demo.minerva.im/ (custom domain).
      # A root-only base `/` would wrongly resolve JS/CSS to `https://labsyspharm.github.io/assets/...`.
      # dicom-pages: unset (`vite` default base).
      - name: Build with pnpm
        env:
          BASE_PATH: ${{ (github.ref == 'refs/heads/annotation' || github.ref == 'refs/heads/main') && './' || '' }}
        run: |
          pnpm run pages

      # Package main build for the gh-pages publish job (cannot combine contents: read + git push in one job).
      - name: Upload dist for gh-pages (main only)
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: site-dist
          path: dist

      # dicom-pages -> lsp-idc-minerva
      - name: Push artifact (dicom-pages)
        if: github.ref == 'refs/heads/dicom-pages'
        env:
          PAT: ${{ secrets.PAT }}
          EMAIL: ${{ secrets.EMAIL }}
          NAME: ${{ secrets.NAME }}
        run: |
          git config --global user.email "$EMAIL"
          git config --global user.name "$NAME"

          git clone "https://${PAT}@github.com/labsyspharm/lsp-idc-minerva.git"
          rm -rf ./lsp-idc-minerva/*
          cp -R ./dist/* ./lsp-idc-minerva/
          cd ./lsp-idc-minerva
          git add -A
          git commit -m update --allow-empty
          git push -f

      # annotation -> minerva-annotation-demo
      - name: Push artifact (annotation)
        if: github.ref == 'refs/heads/annotation'
        env:
          PAT: ${{ secrets.PAT }}
          EMAIL: ${{ secrets.EMAIL }}
          NAME: ${{ secrets.NAME }}
        run: |
          git config --global user.email "$EMAIL"
          git config --global user.name "$NAME"

          git clone "https://${PAT}@github.com/labsyspharm/minerva-annotation-demo.git"
          rm -rf ./minerva-annotation-demo/*
          cp -R ./dist/* ./minerva-annotation-demo/
          cd ./minerva-annotation-demo
          git add -A
          git commit -m update --allow-empty
          git push -f

  publish-gh-pages:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: gh-pages
      cancel-in-progress: false
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@v6

      - name: Download built site
        uses: actions/download-artifact@v8
        with:
          name: site-dist
          path: dist

      # Preserve PR previews under pr-preview/** ([rossjrw/pr-preview-action](https://github.com/rossjrw/pr-preview-action)).
      - name: Publish production site to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          force: false
          clean: true
          clean-exclude: |
            pr-preview/**

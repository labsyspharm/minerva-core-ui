# Requires Pages source **Deploy from branch → gh-pages** (same branch this action writes). “GitHub Actions” Pages does not serve `gh-pages` commits ([see README](https://github.com/rossjrw/pr-preview-action)).
name: Deploy PR Preview

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: preview-${{ github.ref }}

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    concurrency:
      group: gh-pages
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 21

      - uses: pnpm/action-setup@v5
        name: Install pnpm
        with:
          version: 10
          run_install: true

      # Same Vite build as Github Pages (`build.yml`): relative base so assets load under
      # `…/pr-preview/pr/<number>/`.
      - name: Install and build
        if: github.event.action != 'closed'
        env:
          BASE_PATH: "./"
        run: pnpm run pages

      - name: Deploy preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./dist
          preview-branch: gh-pages
